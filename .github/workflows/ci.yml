name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel old runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Flake checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check flake health
        uses: DeterminateSystems/flake-checker-action@v12
        with:
          nixpkgs-keys: nixpkgs,nixpkgs-stable

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Run flake checks
        run: nix flake check -v --show-trace --keep-going

  build:
    name: Build NixOS configuration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Setup Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: false

      - name: Build NixOS configuration
        run: |
          nix build .#nixosConfigurations.fw13.config.system.build.toplevel \
            --print-build-logs \
            --show-trace
